<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        h1 { color: #2c3e50; }
        .analysis { background: #f9f9f9; border-radius: 8px; padding: 1em; margin-bottom: 2em; }
        .key { font-weight: bold; color: #34495e; }
        .value { color: #2d6a4f; }
    </style>
</head>
<body>
    <h1>Analysis Results</h1>
    <div id="results" class="analysis">Loading analysis...</div>
    <script>
        fetch('analysis-results.json')
            .then(response => response.json())
            .then(data => {
                const container = document.getElementById('results');
                container.innerHTML = '';
                for (const key in data) {
                    const div = document.createElement('div');
                    div.innerHTML = `<span class='key'>${key}:</span> <span class='value'>${JSON.stringify(data[key])}</span>`;
                    container.appendChild(div);
                }
            })
            .catch(err => {
                document.getElementById('results').innerText = 'Failed to load analysis.';
            });
    </script>
</body>
</html>
