<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analysis Results</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 2em; }
        h1 { color: #2c3e50; }
        .analysis { background: #f9f9f9; border-radius: 8px; padding: 1em; margin-bottom: 2em; }
        .key { font-weight: bold; color: #34495e; }
        .value { color: #2d6a4f; }
    </style>
</head>
<body>
    <h1>Analysis Results</h1>
    <p style="font-size:small;color:#888;">Redeploy triggered: March 6, 2026</p>
    <div id="results" class="analysis">Loading analysis...</div>
    <script>
        function createTable(headers, rows) {
            let html = '<table><thead><tr>';
            headers.forEach(h => html += `<th>${h}</th>`);
            html += '</tr></thead><tbody>';
            rows.forEach(row => {
                html += '<tr>';
                headers.forEach(h => html += `<td>${row[h]}</td>`);
                html += '</tr>';
            });
            html += '</tbody></table>';
            return html;
        }

        fetch('analysis-results.json')
            .then(response => response.json())
            .then(json => {
                // Support JSON with 'full_analysis' root
                const data = json.full_analysis ? json.full_analysis : json;
                const container = document.getElementById('results');
                let html = '';
                html += `<h2>Analysis Date: ${data.analysis_date ? new Date(data.analysis_date).toLocaleString() : 'N/A'}</h2>`;
                html += `<h3>Total Applicants: ${data.total_applicants !== undefined ? data.total_applicants : 'N/A'}</h3>`;

                // Metric 1: Barriers
                if (data.metrics_summary && data.metrics_summary.metric_1_barriers) {
                    const m1 = data.metrics_summary.metric_1_barriers;
                    html += `<h2>Top Barriers</h2>`;
                    if (m1.top_barriers) html += createTable(['barrier','count','percentage'], m1.top_barriers);
                    if (m1.all_barriers) {
                        html += `<h3>All Barriers</h3>`;
                        html += createTable(['barrier','count','percentage'], m1.all_barriers);
                    }
                    if (m1.barrier_depth_distribution) {
                        html += `<h3>Barrier Depth Distribution</h3>`;
                        html += createTable(['type','count','percentage'], Object.entries(m1.barrier_depth_distribution).map(([type, obj]) => ({type, ...obj})));
                    }
                    if (m1.applicants_mentioning_multiple_barriers !== undefined)
                        html += `<p>Applicants mentioning multiple barriers: <b>${m1.applicants_mentioning_multiple_barriers}</b> (${m1.percentage_with_multiple || 0}%)</p>`;
                    if (m1.applicants_mentioning_three_plus !== undefined)
                        html += `<p>Applicants mentioning three+ barriers: <b>${m1.applicants_mentioning_three_plus}</b> (${m1.percentage_with_three_plus || 0}%)</p>`;
                    if (m1.applicants_mentioning_four_plus !== undefined)
                        html += `<p>Applicants mentioning four+ barriers: <b>${m1.applicants_mentioning_four_plus}</b> (${m1.percentage_with_four_plus || 0}%)</p>`;
                }

                // Metric 3: Governance Engagement
                if (data.metrics_summary && data.metrics_summary.metric_3_engagement) {
                    const m3 = data.metrics_summary.metric_3_engagement;
                    html += `<h2>Governance Engagement</h2>`;
                    if (m3.all_governance_keywords) {
                        html += `<h3>All Governance Keywords</h3>`;
                        html += createTable(['keyword','count','percentage'], m3.all_governance_keywords);
                    }
                    if (m3.governance_depth_distribution) {
                        html += `<h3>Governance Depth Distribution</h3>`;
                        html += createTable(['type','count','percentage'], Object.entries(m3.governance_depth_distribution).map(([type, obj]) => ({type, ...obj})));
                    }
                    if (m3.applicants_with_governance_signal !== undefined)
                        html += `<p>Applicants with governance signal: <b>${m3.applicants_with_governance_signal}</b> (${m3.percentage_with_signal || 0}%)</p>`;
                    if (m3.applicants_with_multiple_signals !== undefined)
                        html += `<p>Applicants with multiple signals: <b>${m3.applicants_with_multiple_signals}</b> (${m3.percentage_with_multiple_signals || 0}%)</p>`;
                    if (m3.applicants_with_three_plus_signals !== undefined)
                        html += `<p>Applicants with three+ signals: <b>${m3.applicants_with_three_plus_signals}</b> (${m3.percentage_with_three_plus_signals || 0}%)</p>`;
                }

                // Metric 4: Regional Collaboration
                if (data.metrics_summary && data.metrics_summary.metric_4_collaboration) {
                    const m4 = data.metrics_summary.metric_4_collaboration;
                    html += `<h2>Regional Collaboration</h2>`;
                    if (m4.all_regional_keywords) {
                        html += `<h3>All Regional Keywords</h3>`;
                        html += createTable(['keyword','count','percentage'], m4.all_regional_keywords);
                    }
                    if (m4.regional_collaboration_depth_distribution) {
                        html += `<h3>Collaboration Depth Distribution</h3>`;
                        html += createTable(['type','count','percentage'], Object.entries(m4.regional_collaboration_depth_distribution).map(([type, obj]) => ({type, ...obj})));
                    }
                    if (m4.applicants_expressing_regional_interest !== undefined)
                        html += `<p>Applicants expressing regional interest: <b>${m4.applicants_expressing_regional_interest}</b> (${m4.percentage_interested || 0}%)</p>`;
                }

                // Display full applicant list
                if (data.applicants && Array.isArray(data.applicants)) {
                    html += `<h2>Applicant Details</h2>`;
                    html += createTable(
                        ['row','name','country','organization','barrier_keywords_found','barrier_count','governance_keywords_found','governance_count','collaboration_keywords_found','collaboration_count','total_keyword_occurrences','has_multiple_barriers','has_governance_signal','has_multiple_governance_signals','expresses_regional_interest'],
                        data.applicants.map(app => ({
                            ...app,
                            barrier_keywords_found: app.barrier_keywords_found ? app.barrier_keywords_found.join(', ') : '',
                            governance_keywords_found: app.governance_keywords_found ? app.governance_keywords_found.join(', ') : '',
                            collaboration_keywords_found: app.collaboration_keywords_found ? app.collaboration_keywords_found.join(', ') : '',
                            has_multiple_barriers: app.has_multiple_barriers ? 'Yes' : 'No',
                            has_governance_signal: app.has_governance_signal ? 'Yes' : 'No',
                            has_multiple_governance_signals: app.has_multiple_governance_signals ? 'Yes' : 'No',
                            expresses_regional_interest: app.expresses_regional_interest ? 'Yes' : 'No'
                        })
                    ));
                }

                container.innerHTML = html;
            })
            .catch(err => {
                document.getElementById('results').innerText = 'Failed to load analysis.';
            });
    </script>
</body>
</html>
